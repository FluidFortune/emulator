[env:esp32s3]
platform = espressif32 @ 6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; Upload speed — slower fixes "No serial data received" on T-Deck Plus
upload_speed = 115200

; Native USB CDC upload fix for ESP32-S3 on macOS.
; The chip has no dedicated USB-serial bridge — after the stub runs, the port
; re-enumerates and macOS needs a moment before esptool can talk to it.
; no_reset skips the DTR/RTS toggle (meaningless on CDC), and the explicit
; --before/--after flags give esptool the correct reset sequencing.
upload_resetmethod = no_reset
upload_flags =
    --before=default_reset
    --after=hard_reset

; --- MEMORY CONFIGURATION ---
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv

; --- BUILD FLAGS ---
; PSRAM HEAP REDIRECT:
; CONFIG_SPIRAM_USE_MALLOC redirects malloc()/new/String heap allocations
; above the threshold to PSRAM automatically. Internal SRAM is reserved
; for ISR-critical buffers, task stacks, and the Arduino core.
; This prevents heap fragmentation in SRAM during high-density WiFi/BLE
; scans without requiring manual ps_malloc() calls throughout the codebase.
;
; ELF EXECUTION FLAGS:
; -fPIC: Position Independent Code — required for ELF modules loaded into
;        arbitrary PSRAM addresses at runtime.
; -mfix-esp32-psram-cache-issue: Required for code executing from PSRAM on
;        ESP32-S3. Prevents cache coherency issues when PSRAM-resident code
;        accesses internal SRAM data.
; IRAM_ATTR is not usable for ELF-loaded code. All ELF module functions
; execute from PSRAM by definition.
build_flags = 
    -I include
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -fPIC
    -mfix-esp32-psram-cache-issue
    -Os
    ; ELF Engine version tag
    -DPISCES_ELF_API_MAJOR=1
    -DPISCES_ELF_API_MINOR=0
    -DPISCES_OS_VERSION=\"1.0.1\"

lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    lewisxhe/XPowersLib @ 0.2.1
    tamctec/TAMC_GT911 @ 1.0.2
    greiman/SdFat @ 2.2.3
    mikalhart/TinyGPSPlus @ 1.0.3
    bblanchon/ArduinoJson @ 7.4.3
    h2zero/NimBLE-Arduino @ 1.4.1
    esphome/ESP32-audioI2S @ 2.1.0
    https://github.com/tzapu/WiFiManager.git
    jgromes/RadioLib @ ^6.4.0
    ; NOTE: Bluepad32 (lemmingdev/ESP32-BLE-Gamepad or bluepad32/bluepad32)
    ; is an alternative to the custom gamepad.h BLE HID implementation.
    ; If NimBLE HID client connection proves unreliable with Zero 2,
    ; add Bluepad32 here and replace gamepad.h with its abstraction layer.
    ; Bluepad32 handles Classic BT + BLE HID and works with 8BitDo natively.
    ; lemmingdev/ESP32-BLE-Gamepad @ ^0.5.4


; ============================================================
;  SDL2 NATIVE DEV ENVIRONMENT
;  "pio run -e sdl2" builds and runs Pisces Moon on desktop.
;
;  Prerequisites (Ubuntu/Debian):
;    sudo apt install libsdl2-dev
;  Prerequisites (macOS):
;    brew install sdl2
;  Prerequisites (Windows):
;    Install SDL2 dev libs, add to PATH
;
;  Emulates T-Deck Plus hardware exactly:
;    - Two pthreads    = Core 0 (Ghost Engine) + Core 1 (UI)
;    - sdl_spi_mutex   = spi_mutex SPI Bus Treaty enforcement
;    - 320x240 window  = IPS display (2x scaled to 640x480)
;    - Mouse           = GT911 touch (click/drag)
;    - Arrow keys      = Trackball (250ms/80ms lockout honored)
;    - All other keys  = T-Deck QWERTY keyboard
;    - ./sd/           = MicroSD card root
;    - malloc()        = PSRAM (CONFIG_SPIRAM_USE_MALLOC behavior)
;
;  ELF Development:
;    Compile ELF modules with the esp32s3 env as normal.
;    Drop .elf files into ./sd/apps/ for the SDL2 build to load.
;    The ElfContext passed to elf_main() is identical in both envs.
;
;  Controls:
;    Mouse click/drag  = Touch screen
;    Arrow keys        = Trackball navigation
;    RAlt + Enter      = Trackball click (open/select)
;    All other keys    = T-Deck physical keyboard
; ============================================================
[env:sdl2]
platform = native
build_flags =
    -DPISCES_SDL
    -DPISCES_OS_VERSION=\"1.0.1-SDL2\"
    -DPISCES_ELF_API_MAJOR=1
    -DPISCES_ELF_API_MINOR=0
    -Isdl2
    -Isrc
    -std=c++17
    -lpthread
    `sdl2-config --cflags --libs`
    -Wall
    -Wno-unused-parameter

; SDL2 build uses its own HAL instead of Arduino/ESP-IDF libs
; No lib_deps needed — SDL2 is a system library
build_src_filter =
    +<*.cpp>
    -<wardrive.cpp>
    -<bluetooth_app.cpp>
    -<lora_voice.cpp>
    -<audio_player.cpp>
    -<audio_recorder.cpp>
    -<voice_terminal.cpp>
    -<micropython_app.cpp>
    -<doom_app.cpp>
    +<sdl2/hal_sdl2.cpp>
    +<sdl2/input_sdl2.cpp>


; ============================================================
;  HID BUILD — USB Ducky wired injection
;  Flash this env to use USB Ducky in wired mode.
;  All other apps work identically to esp32s3.
; ============================================================
[env:esp32s3_hid]
platform = espressif32 @ 6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_resetmethod = no_reset
upload_flags =
    --before=default_reset
    --after=hard_reset
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
build_flags =
    -I include
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DUSB_HID_BUILD=1
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -fPIC
    -mfix-esp32-psram-cache-issue
    -Os
    -DPISCES_ELF_API_MAJOR=1
    -DPISCES_ELF_API_MINOR=0
    -DPISCES_OS_VERSION=\"1.0.1\"
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    lewisxhe/XPowersLib @ 0.2.1
    tamctec/TAMC_GT911 @ 1.0.2
    greiman/SdFat @ 2.2.3
    mikalhart/TinyGPSPlus @ 1.0.3
    bblanchon/ArduinoJson @ 7.4.3
    h2zero/NimBLE-Arduino @ 1.4.1
    esphome/ESP32-audioI2S @ 2.1.0
    https://github.com/tzapu/WiFiManager.git
    jgromes/RadioLib @ ^6.4.0


; ============================================================
;  KODEDOT SDL2 DEV ENVIRONMENT
;  "pio run -e kodedot_sdl2" — develop for KodeDot before
;  hardware ships. Based on official block diagram (May 2026).
;
;  480×480 AMOLED square display (theoretical — confirm spec)
;  ESP32-P4 @ 400MHz main processor
;  ESP32-C5 WiFi6/BLE5 co-processor (simulated)
;  D-pad instead of trackball (Arrow keys)
;  NFC ST25R3916B + 125kHz RFID (mock/bridge/file modes)
;  IR, IMU, Magnetometer, Haptic motor all emulated
;
;  All TODOs in hal_kodedot.h resolve when official pinouts land.
;  App code does not change — only hal_kodedot.h gets filled in.
; ============================================================
[env:kodedot_sdl2]
platform = native
build_flags =
    -DPISCES_SDL
    -DPISCES_KODEDOT
    -DPISCES_KODEDOT_SDL2
    -DPISCES_OS_VERSION=\"1.0.1-KodeDot-SDL2\"
    -DPISCES_ELF_API_MAJOR=1
    -DPISCES_ELF_API_MINOR=0
    -Isdl2
    -Isrc
    -std=c++17
    -lpthread
    `sdl2-config --cflags --libs`
    -Wall
    -Wno-unused-parameter

build_src_filter =
    +<*.cpp>
    -<wardrive.cpp>
    -<bluetooth_app.cpp>
    -<lora_voice.cpp>
    -<audio_player.cpp>
    -<audio_recorder.cpp>
    -<voice_terminal.cpp>
    -<micropython_app.cpp>
    -<doom_app.cpp>
    +<sdl2/hal_sdl2.cpp>
    +<sdl2/hal_kodedot_sdl2.cpp>
    +<sdl2/input_sdl2.cpp>
    +<sdl2/nfc_sdl2.cpp>
